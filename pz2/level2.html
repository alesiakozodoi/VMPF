<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рівень 2 — Парсер JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: vertical;
        }
        button {
            margin: 10px 0;
            padding: 10px 25px;
            font-size: 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #2980b9; }
        #result {
            background: #fff;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
            overflow: auto;
        }
        .error { color: #e74c3c; font-weight: bold; }
        .valid { color: #27ae60; font-weight: bold; }

        /* Деревоподібна структура */
        .tree-node { margin-left: 20px; }
        .tree-key { color: #8e44ad; font-weight: bold; }
        .tree-string { color: #27ae60; }
        .tree-number { color: #2980b9; }
        .tree-boolean { color: #e67e22; }
        .tree-null { color: #95a5a6; }
        .tree-type {
            font-size: 11px;
            color: #999;
            margin-left: 5px;
        }
        .tree-bracket {
            color: #333;
            cursor: pointer;
        }
        .tree-bracket:hover { color: #3498db; }
    </style>
</head>
<body>
    <h1>Рівень 2: Парсер JSON</h1>

    <div class="container">
        <div class="panel">
            <h2>Введіть JSON:</h2>
            <textarea id="jsonInput">{
  "student": {
    "name": "Олена",
    "age": 20,
    "active": true,
    "courses": ["Python", "Django", "React"],
    "address": {
      "city": "Київ",
      "country": "Україна"
    },
    "scholarship": null
  }
}</textarea>
            <br>
            <button onclick="parseJSON()">Розібрати JSON</button>
            <span id="status"></span>
        </div>

        <div class="panel">
            <h2>Результат (деревоподібна структура):</h2>
            <div id="result">Введіть JSON та натисніть "Розібрати JSON"</div>
        </div>
    </div>

    <script>
        function parseJSON() {
            const input = document.getElementById('jsonInput').value;
            const resultDiv = document.getElementById('result');
            const statusSpan = document.getElementById('status');

            try {
                // Парсимо JSON-рядок
                const parsed = JSON.parse(input);

                statusSpan.className = 'valid';
                statusSpan.textContent = ' ✓ JSON валідний';

                // Будуємо деревоподібну структуру
                resultDiv.innerHTML = buildTree(parsed, '');
            } catch (error) {
                statusSpan.className = 'error';
                statusSpan.textContent = ' ✗ Невалідний JSON: ' + error.message;
                resultDiv.innerHTML = '<p class="error">Помилка парсингу: ' + error.message + '</p>';
            }
        }

        function getType(value) {
            if (value === null) return 'null';
            if (Array.isArray(value)) return 'array';
            return typeof value;
        }

        function buildTree(data, indent) {
            const type = getType(data);
            let html = '';

            if (type === 'object') {
                const keys = Object.keys(data);
                html += '<span class="tree-bracket">{</span>';
                html += '<span class="tree-type"> (object, ' + keys.length + ' keys)</span>';
                html += '<div class="tree-node">';
                keys.forEach((key, i) => {
                    html += '<div>';
                    html += '<span class="tree-key">"' + key + '"</span>: ';
                    html += buildTree(data[key], indent + '  ');
                    if (i < keys.length - 1) html += ',';
                    html += '</div>';
                });
                html += '</div>';
                html += '<span class="tree-bracket">}</span>';
            } else if (type === 'array') {
                html += '<span class="tree-bracket">[</span>';
                html += '<span class="tree-type"> (array, ' + data.length + ' items)</span>';
                html += '<div class="tree-node">';
                data.forEach((item, i) => {
                    html += '<div>';
                    html += '<span class="tree-type">[' + i + '] </span>';
                    html += buildTree(item, indent + '  ');
                    if (i < data.length - 1) html += ',';
                    html += '</div>';
                });
                html += '</div>';
                html += '<span class="tree-bracket">]</span>';
            } else if (type === 'string') {
                html += '<span class="tree-string">"' + data + '"</span>';
                html += '<span class="tree-type"> (string)</span>';
            } else if (type === 'number') {
                html += '<span class="tree-number">' + data + '</span>';
                html += '<span class="tree-type"> (number)</span>';
            } else if (type === 'boolean') {
                html += '<span class="tree-boolean">' + data + '</span>';
                html += '<span class="tree-type"> (boolean)</span>';
            } else if (type === 'null') {
                html += '<span class="tree-null">null</span>';
                html += '<span class="tree-type"> (null)</span>';
            }

            return html;
        }
    </script>
</body>
</html>
